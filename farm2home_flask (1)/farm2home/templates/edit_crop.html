{% extends 'base.html' %}
{% block title %}Edit Crop{% endblock %}
{% block content %}
<section class="section" style="max-width:700px;margin:0 auto;">
  <div class="card">
    <div class="card-title">✏️ Edit Listing — {{ crop.emoji }} {{ crop.name }}</div>
    <form method="post" action="{{ url_for('edit_crop', crop_id=crop.id) }}">
      <div class="form-row">
        <div class="form-group">
          <label>Crop Name *</label>
          <input type="text" name="name" value="{{ crop.name }}" required/>
        </div>
        <div class="form-group">
          <label>Category *</label>
          <select name="category" required>
            <option value="vegetable" {% if crop.category=='vegetable' %}selected{% endif %}>🥦 Vegetable</option>
            <option value="fruit" {% if crop.category=='fruit' %}selected{% endif %}>🍎 Fruit</option>
            <option value="grain" {% if crop.category=='grain' %}selected{% endif %}>🌾 Grain / Cereal</option>
            <option value="pulse" {% if crop.category=='pulse' %}selected{% endif %}>🫘 Pulse / Legume</option>
            <option value="spice" {% if crop.category=='spice' %}selected{% endif %}>🌶️ Spice / Herb</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Quantity</label>
          <input type="number" name="quantity" value="{{ crop.quantity }}" step="any"/>
        </div>
        <div class="form-group">
          <label>Unit</label>
          <select name="unit">
            <option value="kg" {% if crop.unit=='kg' %}selected{% endif %}>kg</option>
            <option value="dozen" {% if crop.unit=='dozen' %}selected{% endif %}>dozen</option>
            <option value="piece" {% if crop.unit=='piece' %}selected{% endif %}>piece</option>
            <option value="quintal" {% if crop.unit=='quintal' %}selected{% endif %}>quintal</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price (₹) per unit</label>
          <input type="number" name="price" value="{{ crop.price }}" step="any"/>
        </div>
        <div class="form-group">
          <label>Minimum Order</label>
          <input type="number" name="min_order" value="{{ crop.min_order }}" min="1"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Harvest Date</label>
          <input type="date" name="harvest_date" value="{{ crop.harvest_date }}"/>
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" name="location" value="{{ crop.location }}"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Status</label>
          <select name="status">
            <option value="active" {% if crop.status=='active' %}selected{% endif %}>Active</option>
            <option value="sold_out" {% if crop.status=='sold_out' %}selected{% endif %}>Sold Out</option>
          </select>
        </div>
        <div class="form-group" style="justify-content:flex-end;">
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin-top:28px;">
            <input type="checkbox" name="is_organic" style="width:18px;height:18px;accent-color:var(--green);"
                   {% if crop.is_organic %}checked{% endif %}/>
            <span>🌿 Organic</span>
          </label>
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description">{{ crop.description }}</textarea>
      </div>
      <div style="display:flex;gap:12px;margin-top:8px;">
        <button type="submit" class="btn btn-green">Save Changes</button>
        <a href="{{ url_for('farmer_dashboard') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
