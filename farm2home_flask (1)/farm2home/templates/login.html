{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 5%;">
  <div class="card" style="max-width:420px;width:100%;">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:3rem;margin-bottom:10px;">🌾</div>
      <h2 style="font-family:'Playfair Display',serif;color:var(--green);font-size:1.8rem;">Welcome Back</h2>
      <p style="color:var(--muted);font-size:.9rem;">Login to your Farm2Home account</p>
    </div>
    <form method="post" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>📱 Phone Number</label>
        <input type="tel" name="phone" placeholder="e.g. 9999999999" required/>
      </div>
      <div class="form-group">
        <label>🔒 Password</label>
        <input type="password" name="password" placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="btn btn-green" style="width:100%;padding:13px;font-size:1rem;margin-top:6px;">Login</button>
    </form>
    <div style="text-align:center;margin-top:20px;font-size:.88rem;color:var(--muted);">
      Don't have an account? <a href="{{ url_for('register') }}" style="color:var(--green);font-weight:700;">Sign Up</a>
    </div>
    <div style="margin-top:20px;background:var(--green-pale);border-radius:10px;padding:14px;font-size:.82rem;color:var(--muted);">
      <strong style="color:var(--green);">Demo credentials:</strong><br/>
      Customer: 9999999999 / pass123<br/>
      Farmer: 9000000001 / pass123
    </div>
  </div>
</div>
{% endblock %}
